name: Deploy

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: [master]

jobs:
  update-infra:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: jonnybbb/rove-routes-infrastructure
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: main

      - name: Update image tag in values.yaml
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          sed -i "s|^\(\s*tag:\s*\).*# brouter-image-tag|\\1\"${SHA}\" # brouter-image-tag|" helm/rove-routes/values.yaml
          echo "Updated brouter image tag to ${SHA}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          commit-message: "chore: update brouter image to ${{ github.event.workflow_run.head_sha }}"
          title: "chore: update brouter image to ${{ github.event.workflow_run.head_sha }}"
          body: |
            Automated PR to update the BRouter image tag.

            - **Image:** `ghcr.io/jonnybbb/brouter:${{ github.event.workflow_run.head_sha }}`
            - **Source commit:** jonnybbb/brouter@${{ github.event.workflow_run.head_sha }}
          branch: deploy/brouter-${{ github.event.workflow_run.head_sha }}
          delete-branch: true
